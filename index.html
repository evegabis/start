```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Estudos</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;

            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #144480;

            margin-bottom: 40px;
        }

        .cartoes {
            display: flex;
            gap: 16px;

            justify-content: center;
            flex-wrap: wrap;
        }

        .cartao {
            width: 280px;
            height: 180px;

            perspective: 1000px;
        }

        .cartao-interno {
            position: relative;

            width: 100%;
            height: 100%;

            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .cartao:hover .cartao-interno {
            transform: rotateY(180deg);
        }

        .cartao-frente,
        .cartao-verso {

            position: absolute;

            width: 100%;
            height: 100%;

            border-radius: 12px;

            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);

            backface-visibility: hidden;

            display: flex;
            flex-direction: column;

            justify-content: center;
            align-items: center;

            text-align: center;

            padding: 20px;

            box-sizing: border-box;
        }

        .cartao-frente {
            background-color: #144480;
            color: white;
        }

        .cartao-verso {
            background-color: #00F4BF;
            color: black;

            transform: rotateY(180deg);
        }

    </style>

</head>

<body>

    <h1>Flashcards de Estudos</h1>

    <section class="cartoes">

        <article class="cartao">

            <div class="cartao-interno">

                <div class="cartao-frente">

                    <h2>HTML</h2>

                    <p>
                        O que significa HTML?
                    </p>

                </div>

                <div class="cartao-verso">

                    <h2>Resposta</h2>

                    <p>
                        HTML significa HyperText Markup Language.
                    </p>

                </div>

            </div>

        </article>

        <article class="cartao">

            <div class="cartao-interno">

                <div class="cartao-frente">

                    <h2>CSS</h2>

                    <p>
                        Para que serve o CSS?
                    </p>

                </div>

                <div class="cartao-verso">

                    <h2>Resposta</h2>

                    <p>
                        CSS é utilizado para estilizar páginas web.
                    </p>

                </div>

            </div>

        </article>

    </section>

</body>

</html>
```
